modules:
  dns_test:
    dns:
      query_class: IN
      query_name: www.google.com
      query_type: A
    prober: dns
    timeout: 5s
  grpc:
    grpc:
      preferred_ip_protocol: ip4
      tls: true
    prober: grpc
  grpc_plain:
    grpc:
      service: service1
      tls: false
    prober: grpc
  ntp:
    ntp:
      high_drift_threshold: 10ms
      measurement_duration: 30s
      preferred_ip_protocol: ip4
      protocol_version: 4
    prober: ntp
    timeout: 5s
  http_2xx:
    http:
      preferred_ip_protocol: ip4
    prober: http
    timeout: 30s
  http_post_2xx:
    http:
      method: POST
    prober: http
    timeout: 3s
  icmp:
    prober: icmp
  icmp_ttl5:
    icmp:
      ttl: 5
    prober: icmp
    timeout: 5s
  irc_banner:
    prober: tcp
    tcp:
      query_response:
      - send: NICK prober
      - send: USER prober prober prober :prober
      - expect: PING :([^ ]+)
        send: PONG ${1}
      - expect: ^:[^ ]+ 001
  pop3s_banner:
    prober: tcp
    tcp:
      query_response:
      - expect: ^+OK
      tls: true
      tls_config:
        insecure_skip_verify: false
  ssh_banner:
    prober: tcp
    tcp:
      query_response:
      - expect: ^SSH-2.0-
      - send: SSH-2.0-blackbox-ssh-check
  tcp_connect:
    prober: tcp
