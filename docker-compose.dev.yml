services:
  dev:
    image: golang:1.26.1-alpine3.23
    working_dir: /app
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    command:
      - sh
      - -c
      - apk add --no-cache git build-base && sh

  test:
    image: golang:1.26.1-alpine3.23
    working_dir: /app
    volumes:
      - .:/app
    command:
      - sh
      - -c
      - apk add --no-cache git build-base && go test ./...

  build:
    image: golang:1.26.1-alpine3.23
    working_dir: /app
    volumes:
      - .:/app
    command:
      - sh
      - -c
      - apk add --no-cache git build-base && go build -o /tmp/blackbox_agent && ls -l /tmp/blackbox_agent

  verify:
    image: golang:1.26.1-alpine3.23
    working_dir: /app
    volumes:
      - .:/app
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache git build-base
        export OPENSEARCH_INDEX=smoke-index
        export OPENSEARCH=
        export OPENSEARCH_USER=
        export OPENSEARCH_PASS=
        export RABBITMQ=
        export RABBITMQ_USER=
        export RABBITMQ_PASS=
        export PROMETHEUS_URL=http://127.0.0.1:19090/api/v1/write
        export PROMETHEUS_USERNAME=
        export PROMETHEUS_PASSWORD=
        export PROMETHEUS_CERT=
        export INSECURETLS=false
        go test ./...
        go build -o /tmp/blackbox_agent
        /tmp/blackbox_agent -t target_sample.yaml -c confignew.yaml -b blackbox.yaml >/tmp/blackbox_agent.log 2>&1 &
        pid=$$!
        sleep 8
        if ! kill -0 $$pid 2>/dev/null; then
          cat /tmp/blackbox_agent.log
          wait $$pid
        fi
        kill $$pid
        wait $$pid || true
        test -s /tmp/blackbox_agent.log
        tail -n 40 /tmp/blackbox_agent.log
